spring.application.name=alfa-birthday
server.port=8080

# H2 Database (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/birthday-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mail (Yandex SMTP) — password ONLY from env/secret
spring.mail.host=smtp.yandex.ru
spring.mail.port=465
spring.mail.username=d.kireenkov32rus@yandex.ru
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.connectiontimeout=30000

# App settings — from = same as smtp username; recipients comma-separated
app.email.from=${spring.mail.username}
app.email.recipients=a.qa.cloud@yandex.ru,d.kireenkov32rus@yandex.ru
app.scheduler.cron=0 0 5 * * *

# Retry settings
app.smtp.retry.delay=30000

# File sync from folder
app.sync.folder=./sync
app.sync.cron=0 0 6 * * MON

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
