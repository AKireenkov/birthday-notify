<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Notify - Сотрудники</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #2c3e50; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        h1 { text-align: center; margin-bottom: 16px; font-size: 28px; }

        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .toolbar button, .toolbar label { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #d68910; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 4px; }

        .upload-label { background: #27ae60; color: white; display: inline-block; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .upload-label:hover { background: #219a52; }
        #csvFile { display: none; }

        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; }
        .alert-success { background: #d5f5e3; color: #1e8449; border: 1px solid #a9dfbf; }
        .alert-error { background: #fadbd8; color: #922b21; border: 1px solid #f5b7b1; }
        .alert-info { background: #d6eaf8; color: #1a5276; border: 1px solid #aed6f1; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        thead { background: #2c3e50; color: white; }
        th { padding: 12px 16px; text-align: left; font-weight: 500; }
        td { padding: 10px 16px; border-bottom: 1px solid #ecf0f1; }
        tr:hover { background: #f8f9fa; }
        tr.birthday-row { background: #fef9e7; }
        tr.birthday-row:hover { background: #fdf2d3; }
        tr.editing td { background: #eaf2f8; }

        td input { width: 100%; padding: 6px 8px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 14px; }
        td input:focus { border-color: #3498db; outline: none; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }

        .actions { display: flex; gap: 6px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #95a5a6; }
        .empty-state p { font-size: 18px; margin-bottom: 8px; }

        .stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; min-width: 150px; }
        .stat-card .emoji { font-size: 28px; margin-bottom: 4px; }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #3498db; }
        .stat-card .label { font-size: 13px; color: #95a5a6; margin-top: 4px; }
        .stat-card.birthday .number { color: #e74c3c; }
        .stat-date { font-size: 14px; color: #7f8c8d; margin-top: 6px; }

        @media (max-width: 768px) {
            .toolbar { flex-direction: column; }
            td, th { padding: 8px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>&#127874; Birthday Notify</h1>

    <div class="stats">
        <div class="stat-card">
            <div class="emoji">&#128101;</div>
            <div class="number" th:text="${employees.size()}">0</div>
            <div class="label">Сотрудников</div>
        </div>
        <div class="stat-card birthday">
            <div class="emoji">&#127873;</div>
            <div class="number" th:text="${birthdayCount}">0</div>
            <div class="label">Именинников сегодня</div>
        </div>
        <div class="stat-card">
            <div class="emoji">&#128197;</div>
            <div class="stat-date" th:text="${#temporals.format(today, 'dd.MM.yyyy')}"></div>
            <div class="label">Сегодня</div>
        </div>
    </div>

    <div id="alert" class="alert"></div>

    <div class="toolbar">
        <button class="btn-primary" onclick="showAddRow()">+ Добавить сотрудника</button>
        <label class="upload-label" for="csvFile">&#128196; Загрузить CSV</label>
        <input type="file" id="csvFile" accept=".csv" onchange="uploadCsv(this)">
        <button class="btn-warning" onclick="sendTestEmail()">&#9993; Тестовое письмо</button>
        <button class="btn-primary" onclick="syncFromFolder()" style="background:#8e44ad;">&#128260; Синхронизировать</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ФИО</th>
                <th>Дата рождения</th>
                <th>Должность</th>
                <th>Подразделение</th>
                <th style="width:160px;">Действия</th>
            </tr>
        </thead>
        <tbody id="employeeTable">
            <tr th:each="emp : ${employees}"
                th:id="'row-' + ${emp.id}"
                th:classappend="${emp.birthDate.monthValue == today.monthValue and emp.birthDate.dayOfMonth == today.dayOfMonth} ? 'birthday-row' : ''">
                <td th:text="${emp.fullName}"></td>
                <td th:text="${#temporals.format(emp.birthDate, 'dd.MM.yyyy')}"></td>
                <td th:text="${emp.position}"></td>
                <td th:text="${emp.department}"></td>
                <td>
                    <div class="actions">
                        <button class="btn-primary btn-sm" th:onclick="'editRow(' + ${emp.id} + ')'">Изм.</button>
                        <button class="btn-danger btn-sm" th:onclick="'deleteRow(' + ${emp.id} + ')'">Удал.</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${employees.isEmpty()}" class="empty-state">
        <p>Нет сотрудников</p>
        <p style="font-size:14px;">Добавьте вручную или загрузите CSV-файл</p>
    </div>
</div>

<script>
const API = '/api/employees';

function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}

function showAddRow() {
    const tbody = document.getElementById('employeeTable');
    // Remove existing add row if any
    const existing = document.getElementById('row-new');
    if (existing) existing.remove();

    const tr = document.createElement('tr');
    tr.id = 'row-new';
    tr.className = 'editing';
    tr.innerHTML = `
        <td><input type="text" id="new-name" placeholder="Иванов Иван Иванович"></td>
        <td><input type="date" id="new-date"></td>
        <td><input type="text" id="new-position" placeholder="Должность"></td>
        <td><input type="text" id="new-dept" placeholder="Подразделение"></td>
        <td>
            <div class="actions">
                <button class="btn-success btn-sm" onclick="saveNew()">Сохр.</button>
                <button class="btn-danger btn-sm" onclick="document.getElementById('row-new').remove()">Отм.</button>
            </div>
        </td>
    `;
    tbody.insertBefore(tr, tbody.firstChild);
    document.getElementById('new-name').focus();
}

async function saveNew() {
    const name = document.getElementById('new-name').value.trim();
    const date = document.getElementById('new-date').value;
    const pos = document.getElementById('new-position').value.trim();
    const dept = document.getElementById('new-dept').value.trim();

    if (!name || !date) {
        showAlert('ФИО и дата рождения обязательны', 'error');
        return;
    }

    try {
        const res = await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({fullName: name, birthDate: date, position: pos, department: dept})
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error, 'error'); return; }
        showAlert('Сотрудник добавлен', 'success');
        location.reload();
    } catch(e) { showAlert('Ошибка: ' + e.message, 'error'); }
}

function editRow(id) {
    const row = document.getElementById('row-' + id);
    const cells = row.querySelectorAll('td');
    const name = cells[0].textContent;
    const dateStr = cells[1].textContent; // dd.MM.yyyy
    const pos = cells[2].textContent;
    const dept = cells[3].textContent;

    // Parse dd.MM.yyyy to yyyy-MM-dd for input[type=date]
    const parts = dateStr.split('.');
    const isoDate = parts[2] + '-' + parts[1] + '-' + parts[0];

    row.className = 'editing';
    cells[0].innerHTML = '<input type="text" value="' + name + '">';
    cells[1].innerHTML = '<input type="date" value="' + isoDate + '">';
    cells[2].innerHTML = '<input type="text" value="' + pos + '">';
    cells[3].innerHTML = '<input type="text" value="' + dept + '">';
    cells[4].innerHTML = `
        <div class="actions">
            <button class="btn-success btn-sm" onclick="saveEdit(${id})">Сохр.</button>
            <button class="btn-danger btn-sm" onclick="location.reload()">Отм.</button>
        </div>
    `;
}

async function saveEdit(id) {
    const row = document.getElementById('row-' + id);
    const inputs = row.querySelectorAll('input');

    try {
        const res = await fetch(API + '/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                fullName: inputs[0].value.trim(),
                birthDate: inputs[1].value,
                position: inputs[2].value.trim(),
                department: inputs[3].value.trim()
            })
        });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error, 'error'); return; }
        showAlert('Сохранено', 'success');
        location.reload();
    } catch(e) { showAlert('Ошибка: ' + e.message, 'error'); }
}

async function deleteRow(id) {
    if (!confirm('Удалить сотрудника?')) return;
    try {
        const res = await fetch(API + '/' + id, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); showAlert(d.error, 'error'); return; }
        showAlert('Удалено', 'success');
        document.getElementById('row-' + id).remove();
    } catch(e) { showAlert('Ошибка: ' + e.message, 'error'); }
}

async function uploadCsv(input) {
    const file = input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    try {
        const res = await fetch(API + '/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error, 'error'); return; }
        showAlert(data.message, 'success');
        setTimeout(() => location.reload(), 1500);
    } catch(e) { showAlert('Ошибка загрузки: ' + e.message, 'error'); }

    input.value = '';
}

async function syncFromFolder() {
    try {
        showAlert('Синхронизация...', 'info');
        const res = await fetch('/api/sync/run', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error || 'Ошибка', 'error'); return; }
        showAlert(data.message, 'success');
        setTimeout(() => location.reload(), 1500);
    } catch(e) { showAlert('Ошибка: ' + e.message, 'error'); }
}

async function sendTestEmail() {
    try {
        showAlert('Отправка...', 'info');
        const res = await fetch('/api/notify/send-test', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) { showAlert(data.error || 'Ошибка', 'error'); return; }
        showAlert(data.message + ' (именинников: ' + data.birthdaysFound + ')', 'success');
    } catch(e) { showAlert('Ошибка: ' + e.message, 'error'); }
}
</script>
</body>
</html>
